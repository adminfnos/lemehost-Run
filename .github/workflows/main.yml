name: LemeHost Auto Renew
on:
  workflow_dispatch:
  repository_dispatch:
    types: [cron_trigger]
jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

- name: Install dependencies
        run: |
          npm install playwright tesseract.js sharp
          npx playwright install chromium

      - name: Setup VLESS proxy (xray)
        env:
          VLESS_URL: ${{ secrets.VLESS_URL }}
        run: |
          if [ -z "$VLESS_URL" ]; then
            echo "未配置 VLESS_URL，直连运行"
            exit 0
          fi

          echo "下载 xray..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip xray
          chmod +x xray

          echo "用 Python 解析 VLESS URL 并生成 xray 配置..."
          python3 << 'PYEOF'
          import os, json, urllib.parse

          url = os.environ['VLESS_URL']
          url_body = url[len('vless://'):]
          uuid, rest = url_body.split('@', 1)
          hostport, paramstr = rest.split('?', 1)
          if '#' in paramstr:
              paramstr = paramstr.split('#')[0]
          host, port = hostport.rsplit(':', 1)
          params = dict(urllib.parse.parse_qsl(paramstr))

          security = params.get('security', 'none')
          network  = params.get('type', 'tcp')
          sni      = params.get('sni', host)
          flow     = params.get('flow', '')
          pbk      = params.get('pbk', '')
          sid      = params.get('sid', '')
          fp       = params.get('fp', 'chrome')
          ws_host  = params.get('host', host)
          ws_path  = params.get('path', '/')

          print(f"  Host={host} Port={port} Security={security} Network={network}")
          print(f"  WS_HOST={ws_host} WS_PATH={ws_path} SNI={sni}")

          user = {"id": uuid, "encryption": "none"}
          if flow:
              user["flow"] = flow

          if network == 'ws' and security == 'tls':
              stream = {
                  "network": "ws",
                  "security": "tls",
                  "tlsSettings": {"serverName": sni},
                  "wsSettings": {"path": ws_path, "headers": {"Host": ws_host}}
              }
          elif security == 'reality':
              stream = {
                  "network": network,
                  "security": "reality",
                  "realitySettings": {"fingerprint": fp, "serverName": sni, "publicKey": pbk, "shortId": sid}
              }
          elif security == 'tls':
              stream = {
                  "network": network,
                  "security": "tls",
                  "tlsSettings": {"serverName": sni}
              }
          else:
              stream = {"network": network, "security": "none"}

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"auth": "noauth", "udp": True}}],
              "outbounds": [{"protocol": "vless", "settings": {"vnext": [{"address": host, "port": int(port), "users": [user]}]}, "streamSettings": stream}]
          }

          with open('xray_config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print("xray_config.json 已生成")
          PYEOF

          echo "启动 xray..."
          ./xray -config xray_config.json &
          sleep 5

          echo "测试代理连通性..."
          IP=$(curl -s --socks5 127.0.0.1:10808 --max-time 15 https://api.ipify.org 2>/dev/null)
          if [ -n "$IP" ]; then
            echo "代理正常，出口IP: $IP"
            echo "USE_PROXY=1" >> $GITHUB_ENV
          else
            echo "代理连接失败，切换直连"
          fi

      - name: Run Script
        env:
          MY_COOKIES: ${{ secrets.MY_COOKIES }}
          USE_PROXY: ${{ env.USE_PROXY }}
        run: node auto_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
